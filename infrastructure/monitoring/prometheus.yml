global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: startupsaarthi
    environment: production

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # ── NestJS API (custom /metrics endpoint) ────────────────
  - job_name: nestjs_api
    static_configs:
      - targets: ["api:3001"]
        labels:
          app: startupsaarthi-api
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Node Exporter (host OS metrics) ─────────────────────
  - job_name: node_exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          app: node-exporter

  # ── Redis Exporter ───────────────────────────────────────
  - job_name: redis_exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          app: redis

  # ── Nginx Exporter ───────────────────────────────────────
  - job_name: nginx_exporter
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          app: nginx

  # ── PostgreSQL Exporter ──────────────────────────────────
  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          app: postgres

  # ── Prometheus self-monitoring ───────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
