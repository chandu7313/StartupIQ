global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

route:
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-critical

  routes:
    # Critical alerts — immediate notification
    - match:
        severity: critical
      receiver: slack-critical
      repeat_interval: 1h

    # Warning alerts — grouped notification
    - match:
        severity: warning
      receiver: slack-warning
      repeat_interval: 4h

receivers:
  - name: slack-critical
    slack_configs:
      - channel: "#alerts-critical"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '{{ if eq .Status "firing" }}🔥 CRITICAL Alert{{ else }}✅ Resolved{{ end }}: {{ .CommonLabels.alertname }}'
        text: |
          *Environment:* {{ .CommonLabels.cluster }}
          *Alert:* {{ .CommonLabels.alertname }}
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Started:* {{ .StartsAt | since }}
          {{ end }}
        actions:
          - type: button
            text: View in Grafana
            url: "https://grafana.startupsaarthi.com"

  - name: slack-warning
    slack_configs:
      - channel: "#alerts-warning"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: '⚠️ Warning: {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  # If a critical alert is firing, suppress corresponding warnings
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, cluster]
