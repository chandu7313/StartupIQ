version: "3.9"

# Observability stack — add to main docker-compose with:
# docker compose -f docker-compose.yml -f infrastructure/monitoring/docker-compose.monitoring.yml up -d

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ss_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [internal]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ss_alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks: [internal]
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ss_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_FEATURE_TOGGLES_ENABLE: "tempoSearch,tempoBackendSearch"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3005:3000"
    networks: [internal]
    depends_on: [prometheus, loki]

  loki:
    image: grafana/loki:2.9.8
    container_name: ss_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks: [internal]

  promtail:
    image: grafana/promtail:2.9.8
    container_name: ss_promtail
    restart: unless-stopped
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/log/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks: [internal]
    depends_on: [loki]

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: ss_node_exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks: [internal]

  redis-exporter:
    image: oliver006/redis_exporter:v1.59.0
    container_name: ss_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    networks: [internal]
    depends_on: [redis]

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:0.11.0
    container_name: ss_nginx_exporter
    restart: unless-stopped
    command:
      - "-nginx.scrape-uri=http://nginx/nginx_status"
    ports:
      - "9113:9113"
    networks: [internal]
    depends_on: [nginx]

networks:
  internal:
    external: true
    name: startup-validator_internal

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
